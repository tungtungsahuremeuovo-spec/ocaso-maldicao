<div class="grid-2 fade-in">
    <div class="panel">
        <div class="panel-header">📚 Adicionar Lore</div>
        <input id="loreTitulo" placeholder="Título">
        <select id="loreTipo" class="mt-1"><option>Local</option><option>NPC Importante</option><option>Evento</option><option>Organização</option><option>Facção</option><option>Técnica Perdida</option></select>
        <textarea id="loreDesc" class="mt-1" rows="4" placeholder="Descrição detalhada..."></textarea>
        <button class="btn btn-gold w-full mt-2" id="btnAddLore">📖 Adicionar</button>
    </div>
    <div class="panel">
        <div class="panel-header">📖 Enciclopédia</div>
        <input class="search-input" id="loreSearch" placeholder="🔍 Filtrar...">
        <div class="list-container" id="loreList"><div class="empty-state">Nenhum registro.</div></div>
    </div>
</div>
