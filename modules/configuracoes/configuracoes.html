<div class="panel fade-in">
    <div class="panel-header">⚙️ Configurações</div>

    <!-- MESTRE: controles completos -->
    <div id="configMaster" style="display:none;">
        <div class="flex-row">
            <button class="btn btn-gold" id="btnExport">📤 Exportar Campanha</button>
            <button class="btn btn-gold" id="btnExportPlayer">🎭 Exportar Pacote do Jogador</button>
            <button class="btn" id="btnImport">📥 Importar Campanha</button>
            <button class="btn btn-red" id="btnReset">⚠️ Resetar Tudo</button>
        </div>

        <div class="mt-2">
            <p style="font-weight:600; color:var(--gold);">🌐 Sala Online</p>
            <p id="roomInfo" style="font-size:0.85rem; color:var(--text-dim);">Nenhuma sala ativa.</p>
            <div class="flex-row">
                <button class="btn btn-gold" id="btnCreateRoom">🏠 Criar Nova Sala</button>
                <button class="btn btn-red" id="btnLeaveRoom" style="display:none;">🚪 Sair da Sala</button>
                <button class="btn btn-sm" id="btnCopyRoomId" style="display:none;">📋 Copiar ID</button>
            </div>
        </div>

        <div style="margin-top:12px; border-top:1px solid var(--border); padding-top:12px;">
            <label style="font-weight:600; color:var(--gold);">💾 Slots de Salvamento</label>
            <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:4px;">
                <select id="slotSelector">
                    <option value="slot1">Slot 1</option>
                    <option value="slot2">Slot 2</option>
                    <option value="slot3">Slot 3</option>
                </select>
                <button class="btn btn-sm" id="btnSalvarSlot">💾 Salvar neste slot</button>
                <button class="btn btn-sm" id="btnCarregarSlot">📂 Carregar slot</button>
            </div>
        </div>

        <div style="margin-top:12px; border-top:1px solid var(--border); padding-top:12px;">
            <label style="font-weight:600; color:var(--gold);">🔗 Discord Webhook</label>
            <input id="discordWebhook" placeholder="URL do webhook..." style="width:100%; margin-top:4px;">
            <button class="btn btn-sm mt-1" id="btnTestarWebhook">📨 Testar</button>
            <span id="webhookStatus" style="font-size:0.8rem; color:var(--text-dim);"></span>
        </div>

        <div style="margin-top:12px; border-top:1px solid var(--border); padding-top:12px;">
            <button class="btn btn-gold" id="btnExportCampanhaPDF">📄 Exportar Campanha em PDF</button>
        </div>
    </div>

    <!-- TEMA -->
    <div style="margin-top:12px; border-top:1px solid var(--border); padding-top:12px;">
        <label style="font-weight:600; color:var(--gold);">🎨 Tema</label>
        <select id="themeSelector" style="margin-top:4px; width:auto;">
            <option value="dark">🌙 Escuro</option>
            <option value="light">☀️ Claro</option>
        </select>
    </div>

    <!-- ZOOM (⭐ 19) -->
    <div style="margin-top:12px; border-top:1px solid var(--border); padding-top:12px;">
        <label style="font-weight:600; color:var(--gold);">🔍 Zoom da Interface</label>
        <select id="zoomSelector" style="margin-top:4px; width:auto;">
            <option value="80">80%</option>
            <option value="90">90%</option>
            <option value="100" selected>100%</option>
            <option value="110">110%</option>
            <option value="120">120%</option>
        </select>
    </div>

    <!-- SONS (⭐ 23) -->
    <div style="margin-top:12px; border-top:1px solid var(--border); padding-top:12px;">
        <label style="font-weight:600; color:var(--gold);">🔊 Sons de Notificação</label>
        <div style="margin-top:4px;">
            <label><input type="checkbox" id="soundToggle" checked> Ativar sons</label>
        </div>
    </div>

    <div class="mt-2" style="font-size:0.8rem;color:var(--text-dim);">
        <p>💾 Salvamento automático ativo.</p>
        <p><strong>Modo atual:</strong> <span id="currentRole"></span></p>
    </div>
</div>
