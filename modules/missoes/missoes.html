<div class="grid-2 fade-in">
    <div class="panel">
        <div class="panel-header">🏰 Nova Missão</div>
        <input id="qTitulo" placeholder="Título da missão">
        <textarea id="qDesc" class="mt-1" rows="2" placeholder="Descrição"></textarea>
        <div class="flex-row mt-1"><input id="qRecompensa" placeholder="Recompensa"><select id="qStatus"><option>Ativa</option><option>Concluída</option><option>Falha</option></select></div>
        <button class="btn btn-gold w-full mt-2" id="btnAddQuest">🏴 Adicionar Missão</button>
    </div>
    <div class="panel">
        <div class="panel-header">📜 Quadro de Missões</div>
        <div class="list-container" id="questList"><div class="empty-state">Nenhuma missão.</div></div>
    </div>
</div>
