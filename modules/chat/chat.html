<div class="panel fade-in" style="display:flex; flex-direction:column; height:70vh;">
    <div class="panel-header">💬 Chat da Sala</div>

    <!-- Vídeo -->
    <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:8px; background:var(--bg-2); padding:8px; border-radius:6px;">
        <button class="btn btn-sm" id="btnLigarVideo">📹 Iniciar Vídeo</button>
        <button class="btn btn-sm btn-red" id="btnDesligarVideo" style="display:none;">📹 Desligar Vídeo</button>
        <span id="videoStatus" style="font-size:0.8rem; color:var(--text-dim);">Desconectado</span>
        <div style="display:flex; gap:8px; margin-left:auto;">
            <video id="localVideo" autoplay muted style="width:120px; border-radius:8px; background:#111; display:none;"></video>
            <video id="remoteVideo" autoplay style="width:120px; border-radius:8px; background:#111; display:none;"></video>
        </div>
    </div>

    <div id="chatMessages" style="flex:1; overflow-y:auto; background:var(--bg-2); border-radius:6px; padding:10px; margin-bottom:10px;"></div>
    <div class="flex-row">
        <input id="chatInput" placeholder="Digite sua mensagem..." style="flex:1;">
        <button class="btn btn-gold" id="btnSendChat">Enviar</button>
    </div>
</div>
