<div class="panel fade-in">
    <div class="panel-header">🎲 Rolagem de Dados</div>
    <div class="flex-row">
        <div><label>Dado</label><select id="diceFaces"><option value="4">d4</option><option value="6" selected>d6</option><option value="8">d8</option><option value="10">d10</option><option value="12">d12</option><option value="20">d20</option><option value="100">d100</option></select></div>
        <div><label>Quantidade</label><input type="number" id="diceQtd" value="1" min="1"></div>
        <div><label>Modificador</label><input type="number" id="diceMod" value="0"></div>
    </div>
    <button class="btn btn-gold mt-2" id="btnRoll">🎲 Rolar</button>
    <div id="diceResult" style="margin-top:14px; font-size:1.4rem; font-weight:700; color:var(--gold-light);"></div>
    <div id="diceHistory" style="margin-top:8px; font-size:0.8rem; color:var(--text-dim); max-height:200px; overflow-y:auto;"></div>
</div>s
