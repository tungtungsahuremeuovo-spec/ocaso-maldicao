<div class="panel fade-in">
    <div class="panel-header">🎲 Dados</div>
    <div class="dice-area">
        <button class="dice-btn" onclick="window._rollDice(4)">d4</button>
        <button class="dice-btn" onclick="window._rollDice(6)">d6</button>
        <button class="dice-btn" onclick="window._rollDice(8)">d8</button>
        <button class="dice-btn" onclick="window._rollDice(10)">d10</button>
        <button class="dice-btn" onclick="window._rollDice(12)">d12</button>
        <button class="dice-btn" onclick="window._rollDice(20)">d20</button>
    </div>
    <div id="diceResult" style="margin-top:10px; font-size:1.2rem; color:var(--gold);"></div>

    <!-- Pedido de Rolagem -->
    <div style="margin-top:16px; border-top:1px solid var(--border); padding-top:12px;">
        <button class="btn" id="btnPedirRolagem">📨 Pedir Rolagem ao Mestre</button>
        <div id="rollRequestResult" style="margin-top:8px;"></div>
    </div>
</div>
