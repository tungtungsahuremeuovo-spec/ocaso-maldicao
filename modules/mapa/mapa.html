<div class="panel fade-in">
    <div class="panel-header">🗺️ Mapa Tático</div>
    <div style="display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center;">
        <button class="btn btn-sm" id="btnAddToken">➕ Adicionar Token</button>
        <button class="btn btn-sm" id="btnClearMapa">🗑️ Limpar Mapa</button>
        <button class="btn btn-sm" id="btnSyncMapa">🔄 Sincronizar</button>
        <label style="font-size:0.8rem; display:flex; align-items:center; gap:4px;">
            Grid: <input type="number" id="gridSize" value="10" min="5" max="20" style="width:50px;">
        </label>
        <label style="font-size:0.8rem; display:flex; align-items:center; gap:4px; cursor:pointer;">
            🖼️ Fundo:
            <input type="file" id="mapaFundoInput" accept="image/*" style="display:none;">
            <button class="btn btn-sm" id="btnCarregarFundo">📤 Carregar Imagem</button>
        </label>
        <button class="btn btn-sm" id="btnRemoverFundo" style="display:none;">❌ Remover Fundo</button>
    </div>
    <div style="position:relative; width:100%; aspect-ratio:1/1; background:#1a1a2e; border-radius:8px; overflow:hidden;">
        <canvas id="mapCanvas" style="width:100%; height:100%; display:block; cursor:grab;"></canvas>
        <div id="mapaTooltip" style="position:absolute; bottom:8px; left:8px; background:rgba(0,0,0,0.7); color:#fff; padding:4px 10px; border-radius:4px; font-size:0.7rem; pointer-events:none; display:none;"></div>
    </div>
    <div style="margin-top:8px; font-size:0.8rem; color:var(--text-dim);">
        <span id="tokenStatus">Nenhum token selecionado.</span>
    </div>
</div>
