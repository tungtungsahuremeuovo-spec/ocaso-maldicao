<div class="panel fade-in">
    <div class="panel-header">📋 Minha Ficha</div>

    <div id="playerFicha">
        <p class="empty-state">Nenhum personagem criado.</p>
    </div>

    <!-- Formulário com abas -->
    <div id="fichaForm" style="display:none;" class="mt-2">
        <h3 id="formTitle">Criar Personagem</h3>

        <div class="tab-nav" style="margin-bottom:12px; display:flex; gap:6px; flex-wrap:wrap;">
            <button class="tab-btn active" data-ftab="basico">🧬 Básico</button>
            <button class="tab-btn" data-ftab="lore">📖 Lore</button>
            <button class="tab-btn" data-ftab="tecnica">⚡ Técnica & Feitiços</button>
            <button class="tab-btn" data-ftab="inventario">🎒 Inventário</button>
            <button class="tab-btn" data-ftab="dominio">🌌 Domínio</button>
            <button class="tab-btn" data-ftab="aliados">🤝 Aliados</button>
            <button class="tab-btn" data-ftab="historico">📜 Histórico</button>
            <button class="tab-btn" data-ftab="diario">📔 Diário</button>
        </div>

        <!-- ABA 1 – BÁSICO -->
        <div id="ftab-basico" class="ftab-content active">
            <div class="flex-row">
                <div style="flex:1;">
                    <!-- CAMPO NOME COM BOTÃO GERAR -->
                    <div style="display:flex; gap:6px; align-items:center;">
                        <input id="fNome" placeholder="Nome do personagem" style="flex:1;">
                        <button class="btn btn-sm" id="btnGerarNome" title="Gerar nome japonês aleatório">🎲</button>
                    </div>
                    <select id="fOrigem" class="mt-1">
                        <option value="">Sem Origem Especial</option>
                        <option>Semi-Restringido</option>
                        <option>Meio-Maldição</option>
                        <option>Feiticeiro Reencarnado</option>
                        <option>Parasita Espiritual</option>
                        <option>Escolhido do Voto</option>
                        <option>Vaso Imperfeito</option>
                        <option>Restrição Sensorial</option>
                        <option>Herdeiro Amaldiçoado</option>
                        <option>Corpo Adaptativo</option>
                        <option>Filho de Domínio</option>
                        <option>Sobrevivente da Morte</option>
                        <option>Sangue Profano</option>
                        <option>Corpo Vazio</option>
                        <option>Fragmentado</option>
                        <option>Devorador</option>
                        <option>Gêmeo Espiritual</option>
                        <option>Restrição Invertida</option>
                        <option>Aberração Temporal</option>
                        <option>Nascido na Barreira</option>
                        <option>Monstro Artificial</option>
                    </select>
                </div>
                <div style="flex:1; text-align:center;">
                    <label>Avatar</label>
                    <input type="file" id="fAvatar" accept="image/*" style="display:none;">
                    <img id="fAvatarPreview" style="max-width:100px; max-height:100px; border-radius:8px; cursor:pointer; border:2px dashed var(--border);" src="" title="Clique para escolher uma imagem">
                    <button class="btn btn-sm mt-1" id="btnRemoveAvatar" style="display:none;">🗑️ Remover</button>
                </div>
            </div>

            <div class="flex-row mt-1">
                <select id="fEstilo">
                    <option>Lutador</option>
                    <option>Especialista em Combate</option>
                    <option>Controlador</option>
                    <option>Suporte</option>
                    <option>Entoador</option>
                    <option>Restringido</option>
                </select>
                <select id="fGrau">
                    <option value="4">4º Grau</option>
                    <option value="3">3º Grau</option>
                    <option value="2">2º Grau</option>
                    <option value="1">1º Grau</option>
                    <option value="E">Especial</option>
                </select>
                <select id="fStatus">
                    <option value="na_escola">🏫 Na Escola</option>
                    <option value="em_missao">⚔️ Em Missão</option>
                    <option value="ferido">🏥 Ferido</option>
                    <option value="ausente">❓ Ausente</option>
                </select>
            </div>

            <div class="flex-row mt-1">
                <div><label>HP Máx</label><input type="number" id="fHpMax" value="25"></div>
                <div><label>HP Atual</label><input type="number" id="fHp" value="25"></div>
                <div><label>EA Máx</label><input type="number" id="fEaMax" value="30"></div>
                <div><label>EA Atual</label><input type="number" id="fEa" value="30"></div>
                <div><label>Fôlego</label><input type="number" id="fFolego" value="30" disabled></div>
            </div>

            <div class="flex-row mt-1">
                <div><label>Exaustão (0-5)</label><input type="number" id="fExaustao" value="0" min="0" max="5"></div>
                <div><label>Nível de Poder</label><input type="number" id="fNivelPoder" value="1" min="1" max="10"></div>
            </div>

            <!-- HONRA E GLÓRIA -->
            <div class="flex-row mt-1">
                <div><label>🏅 Honra</label><input type="number" id="fHonra" value="0" min="0" max="100"></div>
                <div><label>🏅 Glória</label><input type="number" id="fGloria" value="0" min="0" max="100"></div>
            </div>

            <!-- KARMA -->
            <div class="flex-row mt-1">
                <div><label>⚖️ Karma</label><input type="number" id="fKarma" value="0" min="-10" max="10"></div>
            </div>

            <!-- REPUTAÇÃO (NOVO BLOCO) -->
            <div class="flex-row mt-1">
                <div><label>🏅 Reputação</label><input type="number" id="fReputacao" value="0" min="0" max="10"></div>
            </div>

            <!-- ✅ ATRIBUTOS (com limites dinâmicos e soma 12) -->
            <label class="mt-1" style="font-weight:600; color:var(--gold);">📊 Atributos (máx 5, ou 6/7 para Restringido)</label>
            <div class="flex-row" style="gap:6px; flex-wrap:wrap;">
                <div style="flex:1; min-width:80px;">
                    <label>FOR</label>
                    <div style="display:flex; align-items:center; gap:4px;">
                        <input type="number" id="fForca" value="1" min="1" max="7" style="width:50px;">
                        <span id="modForca" style="font-size:0.8rem; color:var(--gold);">(-2)</span>
                    </div>
                </div>
                <div style="flex:1; min-width:80px;">
                    <label>DES</label>
                    <div style="display:flex; align-items:center; gap:4px;">
                        <input type="number" id="fDestreza" value="1" min="1" max="7" style="width:50px;">
                        <span id="modDestreza" style="font-size:0.8rem; color:var(--gold);">(-2)</span>
                    </div>
                </div>
                <div style="flex:1; min-width:80px;">
                    <label>CON</label>
                    <div style="display:flex; align-items:center; gap:4px;">
                        <input type="number" id="fConstituicao" value="1" min="1" max="7" style="width:50px;">
                        <span id="modConstituicao" style="font-size:0.8rem; color:var(--gold);">(-2)</span>
                    </div>
                </div>
                <div style="flex:1; min-width:80px;">
                    <label>INT</label>
                    <div style="display:flex; align-items:center; gap:4px;">
                        <input type="number" id="fInteligencia" value="1" min="1" max="5" style="width:50px;">
                        <span id="modInteligencia" style="font-size:0.8rem; color:var(--gold);">(-2)</span>
                    </div>
                </div>
                <div style="flex:1; min-width:80px;">
                    <label>SAB</label>
                    <div style="display:flex; align-items:center; gap:4px;">
                        <input type="number" id="fSabedoria" value="1" min="1" max="5" style="width:50px;">
                        <span id="modSabedoria" style="font-size:0.8rem; color:var(--gold);">(-2)</span>
                    </div>
                </div>
                <div style="flex:1; min-width:80px;">
                    <label>PRE</label>
                    <div style="display:flex; align-items:center; gap:4px;">
                        <input type="number" id="fPresenca" value="1" min="1" max="5" style="width:50px;">
                        <span id="modPresenca" style="font-size:0.8rem; color:var(--gold);">(-2)</span>
                    </div>
                </div>
            </div>
            <div style="font-size:0.75rem; color:var(--text-dim); margin-top:4px;">
                💡 Soma atual: <span id="somaAtributos">6</span> / Limite: <span id="limiteAtributos">12</span>
                <span id="atributosStatus" style="margin-left:8px;"></span>
            </div>

            <label class="mt-1">Perícias</label>
            <div class="flex-row">
                <input id="fPericiaInput" placeholder="Digite uma perícia">
                <button class="btn btn-sm" id="btnAddPericia">➕</button>
            </div>
            <div id="fPericiasTags" class="tags mt-1"></div>

            <label class="mt-1">Cicatrizes</label>
            <div class="flex-row">
                <input id="fCicatrizInput" placeholder="Digite uma cicatriz">
                <button class="btn btn-sm" id="btnAddCicatriz">➕</button>
            </div>
            <div id="fCicatrizesTags" class="tags mt-1"></div>

            <label class="mt-1">Ambição</label>
            <input id="fAmbicao" placeholder="Sua ambição principal">

            <label class="mt-1">Medos e Fraquezas</label>
            <input id="fMedos" placeholder="O que seu personagem teme?">

            <textarea class="mt-1" id="fNotas" rows="2" placeholder="Anotações gerais"></textarea>
        </div>

        <!-- ABA 2 – LORE -->
        <div id="ftab-lore" class="ftab-content" style="display:none;">
            <label>História / Antecedentes</label>
            <textarea id="fLore" rows="6" placeholder="Conte a história do seu personagem..."></textarea>
            <label class="mt-1">Aparência</label>
            <textarea id="fAparencia" rows="3" placeholder="Descreva a aparência do personagem..."></textarea>
            <label class="mt-1">Clã / Patrono</label>
            <input id="fCla" placeholder="Nome do clã ou patrono">
        </div>

        <!-- ABA 3 – TÉCNICA & FEITIÇOS -->
        <div id="ftab-tecnica" class="ftab-content" style="display:none;">
            <label>Técnica Inata</label>
            <input id="fTecnica" placeholder="Nome e descrição da sua técnica">
            <label class="mt-1">Feitiços</label>
            <div class="flex-row">
                <input id="fFeiticoNome" placeholder="Nome do feitiço" style="flex:1;">
                <input id="fFeiticoDesc" placeholder="Descrição rápida" style="flex:2;">
            </div>
            <button class="btn btn-sm mt-1" id="btnAddFeitico">➕ Adicionar Feitiço</button>
            <div id="fFeiticosTags" class="tags mt-1"></div>
            <label class="mt-1">Votos Vinculativos</label>
            <div class="flex-row">
                <input id="fVotoNome" placeholder="Nome do Voto" style="flex:1;">
                <input id="fVotoDesc" placeholder="Descrição" style="flex:2;">
            </div>
            <button class="btn btn-sm mt-1" id="btnAddVoto">➕ Adicionar Voto</button>
            <div id="fVotosTags" class="tags mt-1"></div>
        </div>

        <!-- ABA 4 – INVENTÁRIO -->
        <div id="ftab-inventario" class="ftab-content" style="display:none;">
            <label>Itens</label>
            <div class="flex-row">
                <input id="fItemNome" placeholder="Nome do item" style="flex:1;">
                <input id="fItemDesc" placeholder="Descrição" style="flex:2;">
            </div>
            <button class="btn btn-sm mt-1" id="btnAddItem">➕ Adicionar Item</button>
            <div id="fItensTags" class="tags mt-1"></div>
        </div>

        <!-- ABA 5 – DOMÍNIO -->
        <div id="ftab-dominio" class="ftab-content" style="display:none;">
            <label>Expansão de Domínio</label>
            <input id="fDominioNome" placeholder="Nome do Domínio">
            <textarea id="fDominioDesc" class="mt-1" rows="4" placeholder="Regra, condição e gimmick..."></textarea>
        </div>

        <!-- ABA 6 – ALIADOS -->
        <div id="ftab-aliados" class="ftab-content" style="display:none;">
            <label>Aliados e Contatos</label>
            <div class="flex-row">
                <input id="fAliadoNome" placeholder="Nome do aliado" style="flex:1;">
                <input id="fAliadoRelacao" placeholder="Relação (ex: Mentor)" style="flex:1;">
            </div>
            <button class="btn btn-sm mt-1" id="btnAddAliado">➕ Adicionar Aliado</button>
            <div id="fAliadosTags" class="tags mt-1"></div>
        </div>

        <!-- ABA 7 – HISTÓRICO -->
        <div id="ftab-historico" class="ftab-content" style="display:none;">
            <label>Histórico de Alterações</label>
            <div id="fHistoricoList" style="max-height:300px; overflow-y:auto; font-size:0.8rem; background:var(--bg-2); padding:8px; border-radius:4px;">
                <p class="empty-state">Nenhuma alteração registrada.</p>
            </div>
        </div>

        <!-- ABA 8 – DIÁRIO -->
        <div id="ftab-diario" class="ftab-content" style="display:none;">
            <label>Diário do Personagem</label>
            <textarea id="fDiario" rows="8" placeholder="Escreva as memórias do seu personagem..."></textarea>
        </div>

        <button class="btn btn-gold w-full mt-3" id="btnSaveFicha">Salvar Ficha</button>
        <button class="btn btn-red w-full mt-1" id="btnCancelFicha" style="display:none;">Cancelar</button>
    </div>

    <button class="btn btn-gold w-full mt-2" id="btnNewFicha" style="display:none;">➕ Criar Personagem</button>
    <button class="btn w-full mt-1" id="btnExportPDF" style="display:none;">📄 Exportar como PDF</button>
    <button class="btn w-full mt-1" id="btnExportFicha" style="display:none;">📤 Exportar Minha Ficha</button>
    <button class="btn w-full mt-1" id="btnImportFicha" style="display:none;">📥 Importar Ficha</button>
</div>
